<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JK Motion — Jason Knoetze, Motion &amp; Graphic Designer</title>
<meta name="description" content="Jason Knoetze — multidisciplinary motion and graphic designer based in Stellenbosch, South Africa.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body data-work-limit="6">

<header class="scrubber">
  <div class="scrubber__track"></div>
  <div class="scrubber__inner">
    <a href="index.html" class="scrubber__brand">JK<span>MOTION</span><small>REEL.MOV</small></a>
    <span class="scrubber__code">00:00:00</span>
    <button class="scrubber__menu-btn" aria-label="Toggle menu">&#9776;</button>
    <nav class="scrubber__nav">
      <button class="scrubber__kf" data-key="home" data-target="home" onclick="location.href='index.html#home'">Home</button>
      <button class="scrubber__kf" data-key="work" data-target="work" onclick="location.href='index.html#work'">Work</button>
      <button class="scrubber__kf" data-key="about" data-target="about" onclick="location.href='index.html#about'">About</button>
      <button class="scrubber__kf" data-key="contact" data-target="contact" onclick="location.href='index.html#contact'">Contact</button>
    </nav>
  </div>
</header>

<main>
  <section class="hero" id="home" data-section="home">
    <div class="wrap">
      <div class="hero__eyebrow">Available for freelance &amp; collab work</div>
      <h1>
        <span>Motion that</span><br>
        <span class="accent">moves</span> <span class="line2">brands.</span>
      </h1>
      <p class="hero__sub" data-site="bio"></p>
      <div class="hero__actions">
        <a class="btn btn--fill" href="work.html">View the work</a>
        <a class="btn btn--ghost" data-site-href="email" href="#">Start a project</a>
      </div>
    </div>
  </section>

  <div class="marquee"><div class="marquee__track"></div></div>

  <section class="section" id="reel" data-section="reel">
    <div class="wrap">
      <div class="section__tag" style="margin-bottom:16px;">Showreel</div>
      <div class="video-embed">
        <iframe src="https://www.youtube-nocookie.com/embed/JCXV9Hhhalc" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
      </div>
    </div>
  </section>

  <section class="section" id="work" data-section="work">
    <div class="wrap">
      <div class="section__head">
        <h2>Selected<br>Work</h2>
        <a class="section__tag" href="work.html">View all projects &rarr;</a>
      </div>
      <div class="grid" data-work-grid></div>
    </div>
  </section>

  <section class="section" id="about" data-section="about">
    <div class="wrap about">
      <div>
        <div class="section__tag" style="margin-bottom:16px;">About</div>
        <p data-site="bio"></p>
        <div class="stat"><span>Based in</span><span data-site="location"></span></div>
        <div class="stat"><span>Focus</span><span data-site="role"></span></div>
      </div>
      <div>
        <div class="section__tag" style="margin-bottom:16px;">Tools</div>
        <ul class="tool-list" data-tool-list></ul>
      </div>
    </div>
  </section>

  <section class="section contact" id="contact" data-section="contact">
    <div class="wrap">
      <div class="section__tag" style="margin-bottom:16px;">Get in touch</div>
      <h2>Let's make<br><a data-site-href="email" href="#">something move.</a></h2>
      <div class="social-list" data-social-list></div>
    </div>
  </section>
</main>

<footer class="wrap">
  <span data-site="brand"></span>
  <span>&copy; <span id="year"></span> — built to be edited in config.js</span>
</footer>

<script>document.getElementById('year').textContent = new Date().getFullYear();</script>
<script src="config.js"></script>
<script src="script.js"></script>
</body>
</html>
